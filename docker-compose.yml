services:
  postgres:
    image: postgres:16
    container_name: pasport_scans_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot-light:
    profiles: ["light"]
    build:
      context: .
      args:
        VARIANT: light
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./tmp:/app/tmp
    restart: unless-stopped

  bot-full:
    profiles: ["full"]
    build:
      context: .
      args:
        VARIANT: full
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./tmp:/app/tmp
    restart: unless-stopped

volumes:
  postgres_data: