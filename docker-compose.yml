version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: passports
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot-light:
    profiles: ["light"]
    build:
      context: .
      args:
        VARIANT: light
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/passports
      - OCR_MODULE_PRIORITY=openrouter,yandex_ocr
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./tmp:/app/tmp
    restart: unless-stopped

  bot-full:
    profiles: ["full"]
    build:
      context: .
      args:
        VARIANT: full
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/passports
      - OCR_MODULE_PRIORITY=openrouter,yandex_ocr,rupasportread
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./tmp:/app/tmp
    restart: unless-stopped

volumes:
  postgres_data: