services:
  bot-light:
    profiles: ["light"]
    build:
      context: .
      args:
        VARIANT: light
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./tmp:/app/tmp
      - ./bot:/app/bot
      - ./ocr:/app/ocr
      - ./utils:/app/utils
      - ./services:/app/services
      - ./db:/app/db
      - ./config.py:/app/config.py
      - ./main.py:/app/main.py
    restart: unless-stopped

  bot-full:
    profiles: ["full"]
    build:
      context: .
      args:
        VARIANT: full
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./tmp:/app/tmp
      - ./bot:/app/bot
      - ./ocr:/app/ocr
      - ./utils:/app/utils
      - ./services:/app/services
      - ./db:/app/db
      - ./config.py:/app/config.py
      - ./main.py:/app/main.py
    restart: unless-stopped