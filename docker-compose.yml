services:
  postgres:
    image: postgres:16
    container_name: pasport_scans_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-passports}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-passports}"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot-light:
    profiles: ["light"]
    build:
      context: .
      args:
        VARIANT: light
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:${WEB_PORT:-8080}"
    volumes:
      - ./tmp:/app/tmp
      - ./bot:/app/bot
      - ./ocr:/app/ocr
      - ./utils:/app/utils
      - ./services:/app/services
      - ./db:/app/db
      - ./web:/app/web
      - ./config.py:/app/config.py
      - ./main.py:/app/main.py
    restart: unless-stopped

  bot-full:
    profiles: ["full"]
    build:
      context: .
      args:
        VARIANT: full
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:${WEB_PORT:-8080}"
    volumes:
      - ./tmp:/app/tmp
      - ./bot:/app/bot
      - ./ocr:/app/ocr
      - ./utils:/app/utils
      - ./services:/app/services
      - ./db:/app/db
      - ./web:/app/web
      - ./config.py:/app/config.py
      - ./main.py:/app/main.py
    restart: unless-stopped

volumes:
  postgres_data:
